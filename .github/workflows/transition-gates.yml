name: H-Stage Transition Gates

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  transition-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build outputs
        uses: Swatinem/rust-cache@v2

      - name: Run H-stage transition gates
        run: bash scripts/run_transition_gates.sh

      - name: Upload transition gate artifacts
        uses: actions/upload-artifact@v4
        with:
          name: transition-gates-${{ github.run_id }}
          path: target/transition-gates/
          if-no-files-found: ignore
