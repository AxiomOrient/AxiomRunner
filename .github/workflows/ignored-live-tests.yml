name: Ignored Live Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  ignored-live-tests:
    name: Run Ignored Live Tests
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run ignored live test lane
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COMPOSIO_API_KEY: ${{ secrets.COMPOSIO_API_KEY }}
          AXONRUNNER_RUN_AXIOMME_LIVE: ${{ vars.AXONRUNNER_RUN_AXIOMME_LIVE }}
          AXONRUNNER_RUN_DELEGATE_LIVE: ${{ vars.AXONRUNNER_RUN_DELEGATE_LIVE }}
        run: bash scripts/run_ignored_live_tests.sh
