name: F-5 Benchmarks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  benchmark-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build outputs
        uses: Swatinem/rust-cache@v2

      - name: Run F-5 benchmark suite
        env:
          BENCH_PROFILE: "release"
          BENCH_RECORDS: "10000"
          BENCH_ITERATIONS: "25"
          BENCH_WARMUP: "3"
          BENCH_REQUIRED_CONSECUTIVE_PASSES: "3"
          BENCH_MAX_PASSES: "3"
          BENCH_REDUCE_P95_MAX_MS: "0.2"
          BENCH_MEMORY_P95_MAX_MS: "30"
          BENCH_GATEWAY_P95_MAX_MS: "10"
        run: bash scripts/run_benchmarks.sh

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: f5-benchmarks-${{ github.run_id }}
          path: benchmarks/
          if-no-files-found: error
